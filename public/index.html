<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대구사무소 주간 일정 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
</head>
<body class="bg-slate-50 p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">📅 대구사무소 팀원 주간 일정표</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex items-center gap-2">
            <span class="text-xs font-bold text-slate-400 mr-2 uppercase tracking-wider">팀원 필터:</span>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-900 text-white shadow-sm" onclick="filterCalendar('전체', this)">전체보기</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-red-100 text-red-700" onclick="filterCalendar('문창수', this)">문창수</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-blue-100 text-blue-700" onclick="filterCalendar('이승직', this)">이승직</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700" onclick="filterCalendar('이도협', this)">이도협</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700" onclick="filterCalendar('윤진성', this)">윤진성</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-700" onclick="filterCalendar('김성학', this)">김성학</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-200">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        let calendar;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                locale: 'ko',
                // 서버에서 데이터를 가져오는 핵심 설정
                events: {
                    url: '/api/events',
                    method: 'GET',
                    cache: false // 💡 캐시 금지: 서버에서 항상 최신 데이터를 받아옵니다.
                },
                eventClick: function(info) {
                    alert(`📋 [업무 상세 내용]\n${info.event.title}`);
                },
                eventDidMount: function(info) {
                    // 데이터가 그려질 때 요소가 보이도록 강제 설정
                    info.el.style.display = 'block';
                }
            });
            calendar.render();
        });

        function filterCalendar(owner, btnElement) {
            // 버튼 스타일 변경
            btnElement.parentNode.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                if(b.textContent !== '전체보기') b.classList.add('bg-opacity-20');
            });
            btnElement.classList.add('bg-slate-900', 'text-white');

            // 달력 필터링
            calendar.getEvents().forEach(ev => {
                if (owner === '전체' || ev.extendedProps.owner === owner) {
                    ev.setProp('display', 'auto');
                } else {
                    ev.setProp('display', 'none');
                }
            });
        }
    </script>
</body>
</html>
